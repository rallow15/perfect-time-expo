workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
          chmod -R 755 node_modules/.bin/
          chmod -R 755 node_modules/react-native/sdks/hermesc/
      - name: Expo prebuild
        script: npx expo prebuild --platform android
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release.apk

  ios-workflow:
    name: iOS IPA Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
          chmod -R 755 node_modules/.bin/
      - name: Expo prebuild
        script: npx expo prebuild --platform ios
      - name: Build IPA unsigned
        script: |
          xcodebuild -workspace ios/perfecttime.xcworkspace \
            -scheme perfecttime \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/perfecttime.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          mkdir -p $CM_BUILD_DIR/ipa/Payload
          cp -r "$CM_BUILD_DIR/perfecttime.xcarchive/Products/Applications/perfecttime.app" \
            "$CM_BUILD_DIR/ipa/Payload/"
          cd $CM_BUILD_DIR/ipa
          zip -r perfecttime.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/ipa/perfecttime.ipa

