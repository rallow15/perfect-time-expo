workflows:
  ios-workflow:
    name: iOS Production Build
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rallow.perfecttime
      vars:
        BUNDLE_ID: com.rallow.perfecttime
        XCODE_WORKSPACE: ios/perfecttime.xcworkspace
        XCODE_SCHEME: perfecttime
      node: v18.17.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --clean
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
